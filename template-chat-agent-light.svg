<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" font-family="Inter, system-ui, sans-serif">
  <rect width="880" height="520" fill="#F9FAFB"/>
  <!-- Sidebar -->
  <rect x="0" y="0" width="170" height="520" fill="white" stroke="#E4E7EC" stroke-width="1"/>
  <rect x="16" y="16" width="138" height="36" rx="8" fill="#2E90FA"/>
  <text x="85" y="39" font-size="13" font-weight="600" fill="white" text-anchor="middle">+ New Chat</text>
  <text x="16" y="76" font-size="11" fill="#98A2B3">Recent Chats</text>
  
  <text x="32" y="104" font-size="12" fill="#344054">Product launch strategy</text>
  <text x="32" y="118" font-size="10" fill="#98A2B3">2 hours ago</text>
  <text x="32" y="140" font-size="12" fill="#344054">Code review feedback</text>
  <text x="32" y="154" font-size="10" fill="#98A2B3">Yesterday</text>
  <text x="32" y="176" font-size="12" fill="#344054">Market research analysis</text>
  <text x="32" y="190" font-size="10" fill="#98A2B3">2 days ago</text>
  <text x="32" y="212" font-size="12" fill="#344054">Design system updates</text>
  <text x="32" y="226" font-size="10" fill="#98A2B3">3 days ago</text>
  <text x="32" y="248" font-size="12" fill="#344054">Team meeting notes</text>
  <text x="32" y="262" font-size="10" fill="#98A2B3">1 week ago</text>
  <text x="16" y="470" font-size="12" fill="#344054">☽ Dark Mode</text>
  <text x="16" y="496" font-size="12" fill="#344054">⚙ Settings</text>

  <!-- Top Nav -->
  <rect x="170" y="0" width="710" height="48" fill="white" stroke="#E4E7EC" stroke-width="1"/>
  <text x="190" y="30" font-size="16" font-weight="700" fill="#101828">AI Analytics Assistant</text>
  <rect x="360" y="10" width="180" height="28" rx="6" fill="#F2F4F7"/>
  <text x="380" y="29" font-size="12" fill="#98A2B3">🔍 Search conversations...</text>
  <circle cx="800" cy="24" r="14" fill="#EFF8FF"/>
  <text x="800" y="28" font-size="10" fill="#2E90FA" text-anchor="middle">JD</text>

  <!-- AI Message -->
  <circle cx="200" cy="82" r="14" fill="#EFF8FF"/>
  <text x="200" y="86" font-size="10" fill="#2E90FA" text-anchor="middle">AI</text>
  <text x="224" y="76" font-size="11" font-weight="600" fill="#101828">AI Assistant</text>
  <text x="310" y="76" font-size="10" fill="#98A2B3">10:00 AM</text>
  <text x="224" y="94" font-size="12" fill="#344054">Hello! I can help with data analysis, coding, research, and more.</text>

  <!-- User Message -->
  <text x="740" y="130" font-size="11" font-weight="600" fill="#101828" text-anchor="end">You</text>
  <text x="740" y="148" font-size="12" fill="#344054" text-anchor="end">Can you show me some analytics about user engagement?</text>
  <circle cx="766" cy="138" r="14" fill="#F2F4F7"/>
  <text x="766" y="142" font-size="10" fill="#667085" text-anchor="middle">U</text>

  <!-- AI Response -->
  <circle cx="200" cy="185" r="14" fill="#EFF8FF"/>
  <text x="200" y="189" font-size="10" fill="#2E90FA" text-anchor="middle">AI</text>
  <text x="224" y="180" font-size="11" font-weight="600" fill="#101828">AI Assistant</text>
  <text x="224" y="198" font-size="12" fill="#344054">I've analyzed your engagement data. The data shows a positive trend.</text>

  <!-- Generated Analytics label -->
  <text x="210" y="230" font-size="14" font-weight="600" fill="#2E90FA">✦ Generated Analytics</text>

  <!-- Chart Cards -->
  <rect x="210" y="244" width="260" height="140" rx="12" fill="white" stroke="#E4E7EC" stroke-width="1"/>
  <text x="230" y="268" font-size="12" fill="#667085">Conversation Volume</text>
  <text x="430" y="268" font-size="11" fill="#12B76A" text-anchor="end">↗ 12.5%</text>
  <text x="230" y="296" font-size="28" font-weight="700" fill="#101828">2,543</text>
  <polyline points="230,370 260,350 300,355 340,340 380,345 420,330 450,320" fill="none" stroke="#2E90FA" stroke-width="2"/>

  <rect x="490" y="244" width="260" height="140" rx="12" fill="white" stroke="#E4E7EC" stroke-width="1"/>
  <text x="510" y="268" font-size="12" fill="#667085">Response Quality</text>
  <text x="710" y="268" font-size="11" fill="#12B76A" text-anchor="end">↗ 5.2%</text>
  <text x="510" y="296" font-size="28" font-weight="700" fill="#101828">94%</text>
  <path d="M510,370 Q560,340 610,350 Q660,360 710,320" fill="#EFF8FF" stroke="#2E90FA" stroke-width="2"/>

  <!-- Tool Calls -->
  <text x="210" y="410" font-size="13" font-weight="600" fill="#344054">⟐ Tool Calls</text>
  <rect x="210" y="420" width="540" height="32" rx="8" fill="#ECFDF3" stroke="#A6F4C5" stroke-width="1"/>
  <text x="250" y="441" font-size="12" font-weight="500" fill="#027A48">search_database</text>
  <text x="730" y="441" font-size="14" fill="#12B76A" text-anchor="end">✓</text>
  <rect x="210" y="458" width="540" height="32" rx="8" fill="#FFFAEB" stroke="#FEC84B" stroke-width="1"/>
  <text x="250" y="479" font-size="12" font-weight="500" fill="#B54708">execute_code</text>
  <text x="680" y="479" font-size="10" fill="#B54708">Processing...</text>
  <text x="730" y="479" font-size="14" fill="#F79009" text-anchor="end">↻</text>
  <rect x="210" y="496" width="540" height="20" rx="8" fill="#FEF3F2" stroke="#FECDCA" stroke-width="1"/>
  <text x="250" y="510" font-size="12" font-weight="500" fill="#B42318">api_request</text>
  <text x="730" y="510" font-size="14" fill="#F04438" text-anchor="end">✕</text>
</svg>