<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" font-family="Inter, system-ui, sans-serif">
  <rect width="880" height="440" fill="white"/>
  <!-- Sidebar -->
  <rect x="0" y="0" width="170" height="440" fill="white" stroke="#E4E7EC" stroke-width="1"/>
  <rect x="16" y="16" width="138" height="36" rx="8" fill="#2E90FA"/>
  <text x="85" y="39" font-size="13" font-weight="600" fill="white" text-anchor="middle">+ New Chat</text>
  <text x="16" y="76" font-size="11" fill="#98A2B3">Recent Chats</text>
  
  <text x="32" y="104" font-size="12" fill="#344054">Product launch strategy</text>
  <text x="32" y="140" font-size="12" fill="#344054">Code review feedback</text>
  <text x="32" y="176" font-size="12" fill="#344054">Market research analysis</text>

  <!-- Top Nav -->
  <rect x="170" y="0" width="710" height="48" fill="white" stroke="#E4E7EC" stroke-width="1"/>
  <text x="190" y="30" font-size="16" font-weight="700" fill="#101828">AI Analytics Assistant</text>

  <!-- Center content -->
  <rect x="470" y="130" width="72" height="72" rx="16" fill="#D1E9FF"/>
  <rect x="488" y="148" width="36" height="36" rx="8" fill="#2E90FA"/>
  <text x="506" y="172" font-size="20" fill="white" text-anchor="middle">💬</text>
  <text x="506" y="232" font-size="24" font-weight="700" fill="#101828" text-anchor="middle">Agent App</text>
  <text x="506" y="256" font-size="14" fill="#667085" text-anchor="middle">Your AI Assistant</text>

  <!-- Prompt Chips -->
  <rect x="330" y="280" width="160" height="36" rx="8" fill="white" stroke="#E4E7EC" stroke-width="1"/>
  <text x="410" y="303" font-size="13" fill="#344054" text-anchor="middle">What can you help with?</text>
  <rect x="500" y="280" width="100" height="36" rx="8" fill="white" stroke="#E4E7EC" stroke-width="1"/>
  <text x="550" y="303" font-size="13" fill="#344054" text-anchor="middle">Get started</text>
  <rect x="610" y="280" width="150" height="36" rx="8" fill="white" stroke="#E4E7EC" stroke-width="1"/>
  <text x="685" y="303" font-size="13" fill="#344054" text-anchor="middle">Tell me about yourself</text>

  <!-- Chat Input -->
  <rect x="210" y="390" width="530" height="40" rx="10" fill="white" stroke="#E4E7EC" stroke-width="1"/>
  <text x="240" y="415" font-size="13" fill="#98A2B3">Ask about analytics, insights, or data...</text>
  <rect x="700" y="394" width="32" height="32" rx="8" fill="#2E90FA"/>
  <text x="716" y="414" font-size="14" fill="white" text-anchor="middle">➤</text>
</svg>
