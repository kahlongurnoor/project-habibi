<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" font-family="Inter, system-ui, sans-serif">
  <rect width="880" height="420" fill="#FCFCFD"/>
  <text x="32" y="40" font-size="22" font-weight="700" fill="#101828">Button Components</text>
  <text x="32" y="62" font-size="13" fill="#667085">6 hierarchy variants × 3 sizes — covers every action context</text>

  <!-- Primary -->
  <text x="32" y="100" font-size="11" font-weight="600" fill="#667085" letter-spacing="0.08em">PRIMARY</text>
  <rect x="32" y="112" width="120" height="40" rx="8" fill="#6941C6"/>
  <text x="92" y="137" font-size="14" font-weight="600" fill="white" text-anchor="middle">Button CTA</text>
  <rect x="164" y="112" width="140" height="40" rx="8" fill="#6941C6"/>
  <text x="234" y="137" font-size="14" font-weight="600" fill="white" text-anchor="middle">↑ Button CTA</text>
  <rect x="316" y="112" width="140" height="40" rx="8" fill="#7F56D9"/>
  <text x="386" y="137" font-size="14" font-weight="600" fill="white" text-anchor="middle">Hover State</text>
  <rect x="468" y="112" width="120" height="40" rx="8" fill="#6941C6" opacity="0.4"/>
  <text x="528" y="137" font-size="14" font-weight="600" fill="white" text-anchor="middle">Disabled</text>

  <!-- Secondary Color -->
  <text x="32" y="180" font-size="11" font-weight="600" fill="#667085" letter-spacing="0.08em">SECONDARY COLOR</text>
  <rect x="32" y="192" width="120" height="40" rx="8" fill="#F9F5FF" stroke="#E9D7FE" stroke-width="1"/>
  <text x="92" y="217" font-size="14" font-weight="600" fill="#6941C6" text-anchor="middle">Button CTA</text>
  <rect x="164" y="192" width="140" height="40" rx="8" fill="#F9F5FF" stroke="#E9D7FE" stroke-width="1"/>
  <text x="234" y="217" font-size="14" font-weight="600" fill="#6941C6" text-anchor="middle">↑ Button CTA</text>

  <!-- Secondary Gray -->
  <text x="32" y="260" font-size="11" font-weight="600" fill="#667085" letter-spacing="0.08em">SECONDARY GRAY</text>
  <rect x="32" y="272" width="120" height="40" rx="8" fill="white" stroke="#D0D5DD" stroke-width="1"/>
  <text x="92" y="297" font-size="14" font-weight="600" fill="#344054" text-anchor="middle">Button CTA</text>
  <rect x="164" y="272" width="120" height="40" rx="8" fill="white" stroke="#D0D5DD" stroke-width="1"/>
  <text x="224" y="297" font-size="14" font-weight="600" fill="#344054" text-anchor="middle">Edit Plan</text>

  <!-- Destructive -->
  <text x="380" y="260" font-size="11" font-weight="600" fill="#667085" letter-spacing="0.08em">DESTRUCTIVE</text>
  <rect x="380" y="272" width="100" height="40" rx="8" fill="#D92D20"/>
  <text x="430" y="297" font-size="14" font-weight="600" fill="white" text-anchor="middle">Delete</text>
  <rect x="492" y="272" width="130" height="40" rx="8" fill="#FEF3F2" stroke="#FECDCA" stroke-width="1"/>
  <text x="557" y="297" font-size="14" font-weight="600" fill="#B42318" text-anchor="middle">Cancel Plan</text>
  <text x="640" y="297" font-size="14" font-weight="600" fill="#B42318">Remove</text>

  <!-- Sizes -->
  <text x="32" y="340" font-size="11" font-weight="600" fill="#667085" letter-spacing="0.08em">SIZES</text>
  <rect x="32" y="352" width="90" height="34" rx="8" fill="#6941C6"/>
  <text x="77" y="374" font-size="13" font-weight="600" fill="white" text-anchor="middle">Small</text>
  <rect x="134" y="349" width="110" height="40" rx="8" fill="#6941C6"/>
  <text x="189" y="374" font-size="14" font-weight="600" fill="white" text-anchor="middle">Medium</text>
  <rect x="256" y="346" width="120" height="46" rx="8" fill="#6941C6"/>
  <text x="316" y="374" font-size="16" font-weight="600" fill="white" text-anchor="middle">Large</text>

  <!-- Pill filters -->
  <text x="420" y="340" font-size="11" font-weight="600" fill="#667085" letter-spacing="0.08em">QUICK FILTER PILLS</text>
  <rect x="420" y="352" width="80" height="32" rx="16" fill="#F9F5FF"/>
  <text x="460" y="373" font-size="13" font-weight="500" fill="#6941C6" text-anchor="middle">Default</text>
  <rect x="508" y="352" width="100" height="32" rx="16" fill="white" stroke="#E4E7EC" stroke-width="1"/>
  <text x="558" y="373" font-size="13" font-weight="500" fill="#667085" text-anchor="middle">Automatic</text>
</svg>