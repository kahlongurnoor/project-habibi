<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" font-family="Inter, system-ui, sans-serif">
  <rect width="880" height="500" fill="#F2F4F7"/>
  <text x="32" y="40" font-size="22" font-weight="700" fill="#101828">Card Components</text>
  <text x="32" y="62" font-size="13" fill="#667085">Core container patterns used across dashboards and agent interfaces</text>

  <!-- Simple Card -->
  <rect x="32" y="82" width="260" height="100" rx="12" fill="white" stroke="#E4E7EC" stroke-width="1"/>
  <text x="56" y="112" font-size="16" font-weight="600" fill="#101828">Simple Card</text>
  <text x="56" y="132" font-size="13" fill="#667085">A basic card with header</text>
  <text x="56" y="148" font-size="13" fill="#667085">and content area.</text>

  <!-- Card with Icon -->
  <rect x="308" y="82" width="260" height="100" rx="12" fill="white" stroke="#E4E7EC" stroke-width="1"/>
  <rect x="332" y="100" width="36" height="36" rx="8" fill="#F9F5FF"/>
  <rect x="342" y="110" width="16" height="16" rx="4" fill="#6941C6"/>
  <text x="380" y="116" font-size="16" font-weight="600" fill="#101828">Card with Icon</text>
  <text x="380" y="134" font-size="13" fill="#667085">Icon + title layout</text>

  <!-- Stat Cards -->
  <rect x="32" y="198" width="186" height="96" rx="12" fill="white" stroke="#E4E7EC" stroke-width="1"/>
  <text x="52" y="226" font-size="13" fill="#667085" font-weight="500">Total Conversations</text>
  <text x="52" y="266" font-size="28" font-weight="600" fill="#101828">48</text>
  <text x="176" y="226" font-size="14" fill="#98A2B3">ℹ</text>

  <rect x="230" y="198" width="186" height="96" rx="12" fill="white" stroke="#E4E7EC" stroke-width="1"/>
  <text x="250" y="226" font-size="13" fill="#667085" font-weight="500">Avg. Latency</text>
  <text x="250" y="266" font-size="28" font-weight="600" fill="#101828">11.58s</text>

  <rect x="428" y="198" width="186" height="96" rx="12" fill="white" stroke="#E4E7EC" stroke-width="1"/>
  <text x="448" y="226" font-size="13" fill="#667085" font-weight="500">Error Rate</text>
  <text x="448" y="266" font-size="28" font-weight="600" fill="#101828">0.0%</text>

  <!-- Proposed Plan Card -->
  <rect x="32" y="310" width="580" height="180" rx="12" fill="white" stroke="#E4E7EC" stroke-width="1"/>
  <text x="56" y="342" font-size="15" font-weight="600" fill="#101828">Proposed Plan</text>
  <rect x="530" y="326" width="66" height="22" rx="11" fill="#F9F5FF"/>
  <text x="563" y="342" font-size="11" font-weight="500" fill="#6941C6" text-anchor="middle">Version 1</text>
  <line x1="56" y1="354" x2="588" y2="354" stroke="#F2F4F7" stroke-width="1"/>
  <text x="76" y="378" font-size="13" fill="#344054">1. Cards can include buttons and interactive elements.</text>
  <text x="76" y="398" font-size="13" fill="#344054">2. Cards can include buttons and interactive elements.</text>
  <text x="76" y="418" font-size="13" fill="#344054">3. Cards can include buttons and interactive elements.</text>
  <line x1="56" y1="434" x2="588" y2="434" stroke="#E4E7EC" stroke-width="1"/>
  <rect x="416" y="446" width="80" height="34" rx="8" fill="white" stroke="#D0D5DD" stroke-width="1"/>
  <text x="456" y="468" font-size="13" font-weight="600" fill="#344054" text-anchor="middle">Edit Plan</text>
  <rect x="508" y="446" width="96" height="34" rx="8" fill="#6941C6"/>
  <text x="556" y="468" font-size="13" font-weight="600" fill="white" text-anchor="middle">Approve ✓</text>

  <!-- Agent Status Table -->
  <rect x="628" y="82" width="240" height="210" rx="12" fill="white" stroke="#E4E7EC" stroke-width="1"/>
  <text x="648" y="112" font-size="14" font-weight="600" fill="#101828">Available Agents</text>
  <text x="828" y="112" font-size="11" fill="#667085" text-anchor="end">Past 20s</text>
  <line x1="648" y1="122" x2="848" y2="122" stroke="#F2F4F7" stroke-width="1"/>
  
  <text x="648" y="150" font-size="13" fill="#344054">Spend</text>
  <rect x="790" y="137" width="50" height="22" rx="11" fill="#ECFDF3"/>
  <text x="815" y="152" font-size="11" font-weight="500" fill="#027A48" text-anchor="middle">Active</text>
  
  <text x="648" y="182" font-size="13" fill="#344054">DJ Spend</text>
  <rect x="790" y="169" width="50" height="22" rx="11" fill="#ECFDF3"/>
  <text x="815" y="184" font-size="11" font-weight="500" fill="#027A48" text-anchor="middle">Active</text>
  
  <text x="648" y="214" font-size="13" fill="#344054">DJ Spend1</text>
  <rect x="790" y="201" width="50" height="22" rx="11" fill="#ECFDF3"/>
  <text x="815" y="216" font-size="11" font-weight="500" fill="#027A48" text-anchor="middle">Active</text>
  
  <text x="648" y="246" font-size="13" fill="#344054">Learning</text>
  <rect x="790" y="233" width="60" height="22" rx="11" fill="#FEF3F2"/>
  <text x="820" y="248" font-size="11" font-weight="500" fill="#B42318" text-anchor="middle">Error</text>
  
</svg>